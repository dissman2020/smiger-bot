[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --ignore=app
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    auth: Authentication tests
    chat: Chat tests
    knowledge: Knowledge base tests
    faq: FAQ tests
    lead: Lead tests
    handoff: Handoff tests
    rag: RAG engine tests
    security: Security tests
